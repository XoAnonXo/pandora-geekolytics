name: Deploy Pandora Analytics (Pages)

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'
  push:
    branches:
      - main
      - master
    paths:
      - 'analytics/dune/mega/**'
      - 'analytics/dune/panel_registry.json'
      - '.github/workflows/pandora-analytics-pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pandora-analytics-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static analytics site from indexer
        run: node analytics/dune/mega/export-static.cjs --out ./dist/pandora-analytics

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/pandora-analytics

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
